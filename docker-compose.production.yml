# Production compose: uses pre-built images from registry.aitech.work
# Use this on client servers after building and pushing images with: make prod-release

services:
  # TimescaleDB
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: jsenergy_timescaledb
    environment:
      POSTGRES_USER: jsenergy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_password}
      POSTGRES_DB: jsenergy_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jsenergy -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
    restart: unless-stopped

  # Redis (Cache)
  redis:
    image: redis:7-alpine
    container_name: jsenergy_redis
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    ports:
      - "9093:6379"
    networks:
      - backend-network
    restart: unless-stopped

  # MQTT Broker (Mosquitto) - uses image default config (no host file required)
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: jsenergy_mosquitto
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    ports:
      - "1885:1883"
      - "8885:8883"
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 mosquitto_sub -h localhost -t '$$SYS/#' -C 1 > /dev/null 2>&1 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - backend-network
    restart: unless-stopped

  # Soketi (Pusher-compatible WebSocket server)
  soketi:
    image: quay.io/soketi/soketi:1.4-16-debian
    container_name: jsenergy_soketi
    environment:
      SOKETI_DEBUG: "false"
      SOKETI_DEFAULT_APP_ID: ${SOKETI_APP_ID:-jsenergy-app-id}
      SOKETI_DEFAULT_APP_KEY: ${SOKETI_APP_KEY:-jsenergy-app-key}
      SOKETI_DEFAULT_APP_SECRET: ${SOKETI_APP_SECRET:-jsenergy-app-secret}
      SOKETI_DEFAULT_APP_MAX_CONNECTIONS: "100"
      PUSHER_HOST: 0.0.0.0
      DEFAULT_APP_ENABLE_CLIENT_MESSAGES: false
    ports:
      - "6001:6001"  # HTTP API
      - "9601:9601"  # WebSocket
    networks:
      - backend-network
      - frontend-network
    restart: unless-stopped

  # Backend API (pre-built image from registry)
  backend:
    image: registry.aitech.work/jsenergy/backend:latest
    container_name: jsenergy_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://jsenergy:${POSTGRES_PASSWORD:-change_me_password}@timescaledb:5432/jsenergy_db
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MQTT_USERNAME: ${MQTT_USERNAME:-jsenergy}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-change_me_mqtt_password}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_me_to_random_64_character_string}
      ENABLE_MVP_MODE: ${ENABLE_MVP_MODE:-true}
      ENABLE_MULTI_TENANT: ${ENABLE_MULTI_TENANT:-false}
      ENABLE_GENERATOR: ${ENABLE_GENERATOR:-false}
      ENABLE_EV_CHARGERS: ${ENABLE_EV_CHARGERS:-false}
      ENABLE_REVENUE_ANALYTICS: ${ENABLE_REVENUE_ANALYTICS:-false}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONPATH: /app
      SOKETI_APP_ID: ${SOKETI_APP_ID:-jsenergy-app-id}
      SOKETI_APP_KEY: ${SOKETI_APP_KEY:-jsenergy-app-key}
      SOKETI_APP_SECRET: ${SOKETI_APP_SECRET:-jsenergy-app-secret}
      SOKETI_HOST: ${SOKETI_HOST:-soketi}
      SOKETI_PORT: ${SOKETI_PORT:-6001}
      OPEN_WEATHER_API_KEY: ${OPEN_WEATHER_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FIRMWARE_UPLOAD_DIR: /app/firmware
      REVERSE_SSH_HOST: ${REVERSE_SSH_HOST:-support.jsenergy.nl}
      REVERSE_SSH_USER: ${REVERSE_SSH_USER:-rpi-tunnel}
      REVERSE_SSH_PORT: ${REVERSE_SSH_PORT:-22}
    volumes:
      - firmware-data:/app/firmware
    ports:
      - "9091:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
      redis:
        condition: service_healthy
      soketi:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend-network
      - frontend-network
    restart: unless-stopped

  # Frontend (pre-built image from registry)
  frontend:
    image: registry.aitech.work/jsenergy/frontend:latest
    container_name: jsenergy_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://app.jsenergypowerhub.nl}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://jsenergyapi.aitech.work}
      NEXT_PUBLIC_ENABLE_MVP_MODE: ${NEXT_PUBLIC_ENABLE_MVP_MODE:-true}
      NEXT_PUBLIC_ENABLE_GENERATOR: ${NEXT_PUBLIC_ENABLE_GENERATOR:-false}
      NEXT_PUBLIC_ENABLE_EV_CHARGERS: ${NEXT_PUBLIC_ENABLE_EV_CHARGERS:-false}
      NEXT_PUBLIC_ENABLE_REVENUE_ANALYTICS: ${NEXT_PUBLIC_ENABLE_REVENUE_ANALYTICS:-false}
      NEXT_PUBLIC_SOKETI_KEY: ${SOKETI_APP_KEY:-jsenergy-app-key}
      NEXT_PUBLIC_SOKETI_CLUSTER: ${SOKETI_CLUSTER:-mt1}
      NEXT_PUBLIC_SOKETI_HOST: ${FRONTEND_SOKETI_HOST:-localhost}
      NEXT_PUBLIC_SOKETI_PORT: ${FRONTEND_SOKETI_PORT:-443}
    ports:
      - "9090:3000"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - frontend-network
    restart: unless-stopped

volumes:
  postgres-data:
  mosquitto-data:
  mosquitto-log:
  redis-data:
  firmware-data:

networks:
  backend-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16
  frontend-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.0.0/16
