services:
  # TimescaleDB
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: jsenergy_timescaledb_dev
    environment:
      POSTGRES_USER: jsenergy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jsenergy_dev_password}
      POSTGRES_DB: jsenergy_db
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jsenergy -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: jsenergy_pgadmin_dev
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@jsenergy.nl
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - backend-network
    depends_on:
      - timescaledb
    restart: unless-stopped

  # MQTT Broker (Mosquitto)
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: jsenergy_mosquitto_dev
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data-dev:/mosquitto/data
      - mosquitto-log-dev:/mosquitto/log
    ports:
      - "1884:1883"
      - "8884:8883"
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 mosquitto_sub -h localhost -t '$$SYS/#' -C 1 > /dev/null 2>&1 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - backend-network
    restart: unless-stopped

  # Redis (Cache)
  redis:
    image: redis:7-alpine
    container_name: jsenergy_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis-data-dev:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - backend-network
    restart: unless-stopped

  # Soketi (Pusher-compatible WebSocket server)
  soketi:
    image: quay.io/soketi/soketi:1.4-16-debian
    container_name: jsenergy_soketi_dev
    environment:
      SOKETI_DEBUG: 1
      SOKETI_DEFAULT_APP_ID: ${SOKETI_APP_ID:-jsenergy-app-id}
      SOKETI_DEFAULT_APP_KEY: ${SOKETI_APP_KEY:-jsenergy-app-key}
      SOKETI_DEFAULT_APP_SECRET: ${SOKETI_APP_SECRET:-jsenergy-app-secret}
      SOKETI_DEFAULT_APP_MAX_CONNECTIONS: "100"
      PUSHER_HOST: 0.0.0.0
      DEFAULT_APP_ENABLE_CLIENT_MESSAGES: false
    ports:
      - "9601:9601"
      - "6001:6001"
    networks:
      - backend-network
      - frontend-network
    restart: unless-stopped

  # Backend API (Development with hot reload)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: jsenergy_backend_dev
    environment:
      DATABASE_URL: postgresql+asyncpg://jsenergy:${POSTGRES_PASSWORD:-jsenergy_dev_password}@timescaledb:5432/jsenergy_db
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      MQTT_USERNAME: ${MQTT_USERNAME:-jsenergy}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-jsenergy_dev_password}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev_secret_key_change_in_production_64_chars_minimum}
      ENABLE_MVP_MODE: ${ENABLE_MVP_MODE:-true}
      ENABLE_MULTI_TENANT: ${ENABLE_MULTI_TENANT:-false}
      ENABLE_GENERATOR: ${ENABLE_GENERATOR:-false}
      ENABLE_EV_CHARGERS: ${ENABLE_EV_CHARGERS:-false}
      ENABLE_REVENUE_ANALYTICS: ${ENABLE_REVENUE_ANALYTICS:-false}
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
      PYTHONPATH: /app
      SOKETI_APP_ID: ${SOKETI_APP_ID:-jsenergy-app-id}
      SOKETI_APP_KEY: ${SOKETI_APP_KEY:-jsenergy-app-key}
      SOKETI_APP_SECRET: ${SOKETI_APP_SECRET:-jsenergy-app-secret}
      SOKETI_HOST: soketi  # Always use Docker service name for backend-to-backend communication
      SOKETI_PORT: 6001  # Always use port 6001 (Soketi uses same port for HTTP API and WebSocket)
      OPEN_WEATHER_API_KEY: ${OPEN_WEATHER_API_KEY:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      FIRMWARE_UPLOAD_DIR: /app/firmware
      REVERSE_SSH_HOST: ${REVERSE_SSH_HOST:-support.jsenergy.nl}
      REVERSE_SSH_USER: ${REVERSE_SSH_USER:-rpi-tunnel}
      REVERSE_SSH_PORT: ${REVERSE_SSH_PORT:-22}
    volumes:
      - ./backend:/app/backend
      - ./scripts:/app/scripts
      - /app/backend/__pycache__  # Exclude pycache from volume
      - firmware-data-dev:/app/firmware
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_started
      redis:
        condition: service_healthy
      soketi:
        condition: service_started
    command: sh -c "cd /app/backend && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend-network
      - frontend-network
    restart: unless-stopped

  # Frontend (Development with hot reload)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: jsenergy_frontend_dev
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
      NEXT_PUBLIC_ENABLE_MVP_MODE: ${NEXT_PUBLIC_ENABLE_MVP_MODE:-true}
      NEXT_PUBLIC_ENABLE_GENERATOR: ${NEXT_PUBLIC_ENABLE_GENERATOR:-false}
      NEXT_PUBLIC_ENABLE_EV_CHARGERS: ${NEXT_PUBLIC_ENABLE_EV_CHARGERS:-false}
      NEXT_PUBLIC_ENABLE_REVENUE_ANALYTICS: ${NEXT_PUBLIC_ENABLE_REVENUE_ANALYTICS:-false}
      NEXT_PUBLIC_SOKETI_KEY: ${SOKETI_APP_KEY:-jsenergy-app-key}
      NEXT_PUBLIC_SOKETI_CLUSTER: ${SOKETI_CLUSTER:-mt1}
      NEXT_PUBLIC_SOKETI_HOST: localhost  # Always use localhost for browser connections
      NEXT_PUBLIC_SOKETI_PORT: "6001"  # Soketi uses the same port (6001) for both HTTP API and WebSocket
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - frontend-network
    restart: unless-stopped

volumes:
  postgres-data-dev:
  mosquitto-data-dev:
  mosquitto-log-dev:
  redis-data-dev:
  firmware-data-dev:

networks:
  backend-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.21.0.0/16
  frontend-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

